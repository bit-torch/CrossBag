name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: CrossBag ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-artifacts:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: crossbag
            asset: crossbag-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: crossbag.exe
            asset: crossbag-windows-x86_64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: crossbag
            asset: crossbag-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Generate checksum
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          sha256sum ${{ matrix.artifact }} > ${{ matrix.asset }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.artifact }}
            target/${{ matrix.target }}/release/${{ matrix.asset }}.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          files: |
            target/${{ matrix.target }}/release/${{ matrix.artifact }}
            target/${{ matrix.target }}/release/${{ matrix.asset }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
