name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: crossbag
            asset_name: crossbag-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: crossbag.exe
            asset_name: crossbag-windows-x86_64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: crossbag
            asset_name: crossbag-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Generate checksum
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          sha256sum ${{ matrix.binary }} > ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.binary }}
            target/${{ matrix.target }}/release/${{ matrix.asset_name }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release with all assets
        uses: softprops/action-gh-release@v2
        with:
          name: CrossBag ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/crossbag-linux-x86_64/crossbag
            artifacts/crossbag-linux-x86_64/crossbag-linux-x86_64.sha256
            artifacts/crossbag-macos-x86_64/crossbag
            artifacts/crossbag-macos-x86_64/crossbag-macos-x86_64.sha256
            artifacts/crossbag-windows-x86_64.exe/crossbag.exe
            artifacts/crossbag-windows-x86_64.exe/crossbag-windows-x86_64.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
